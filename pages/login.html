<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaisonFlow — Login</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .auth-logo {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
    }
    .auth-logo span { color: #2563eb; }
    .auth-subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .forgot { text-align: right; font-size: 13px; color: #2563eb; cursor: pointer; margin-top: -10px; margin-bottom: 16px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #64748b; }
    .auth-footer a { color: #2563eb; font-weight: 600; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-logo">Maison<span>Flow</span></div>
    <p class="auth-subtitle">Sign in to your account</p>

    <div id="alert"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <p class="forgot" onclick="location.href='forgot-password.html'">Forgot password?</p>

    <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Sign Up</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zefjugcexrmxemfmlgda.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_d42F-4G6jZGOGUux8ztr9Q_Ri2Bkovm'
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function showAlert(message, type) {
      document.getElementById('alert').innerHTML =
        `<div class="alert alert-${type}">${message}</div>`
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      if (!email || !password) {
        showAlert('Please fill in all fields', 'error')
        return
      }

      const { data, error } = await sbClient.auth.signInWithPassword({ email, password })

      if (error) {
        showAlert(error.message, 'error')
        return
      }

      const { data: profile } = await sbClient
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single()

      if (profile?.role === 'admin' || data.user.email === 'foteric.finance@gmail.com') {
        location.href = 'admin.html'
      } else if (profile?.role === 'caretaker') {
        location.href = 'caretaker.html'
      } else if (profile?.role === 'tenant') {
        location.href = 'tenant-portal.html'
      } else {
        location.href = 'dashboard.html'
      }
    }
  </script>

</body>
</html>
