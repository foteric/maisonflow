<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaisonFlow — Register</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .auth-logo {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
    }
    .auth-logo span { color: #2563eb; }
    .auth-subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #64748b; }
    .auth-footer a { color: #2563eb; font-weight: 600; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-logo">Maison<span>Flow</span></div>
    <p class="auth-subtitle">Create your account</p>

    <div id="alert"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="John Doe">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+250 7XX XXX XXX">
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="">Select your role</option>
        <option value="landlord">Landlord</option>
        <option value="caretaker">Caretaker</option>
        <option value="tenant">Tenant</option>
      </select>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters">
    </div>

    <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zefjugcexrmxemfmlgda.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_d42F-4G6jZGOGUux8ztr9Q_Ri2Bkovm'
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function showAlert(message, type) {
      document.getElementById('alert').innerHTML =
        `<div class="alert alert-${type}">${message}</div>`
    }

    async function handleRegister() {
      const fullname = document.getElementById('fullname').value.trim()
      const email = document.getElementById('email').value.trim()
      const phone = document.getElementById('phone').value.trim()
      const role = document.getElementById('role').value
      const password = document.getElementById('password').value

      if (!fullname || !email || !phone || !role || !password) {
        showAlert('Please fill in all fields', 'error')
        return
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters', 'error')
        return
      }

      const { data, error } = await sbClient.auth.signUp({ email, password })

      if (error) {
        showAlert(error.message, 'error')
        return
      }

      await sbClient.from('profiles').insert({
        id: data.user.id,
        full_name: fullname,
        phone: phone,
        role: role
      })

      showAlert('Account created! Please check your email to verify.', 'success')
    }
  </script>

</body>
</html>
