<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaisonFlow — Reset Password</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .auth-logo {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
    }
    .auth-logo span { color: #2563eb; }
    .auth-subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #64748b; }
    .auth-footer a { color: #2563eb; font-weight: 600; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-logo">Maison<span>Flow</span></div>
    <p class="auth-subtitle">Enter your new password</p>

    <div id="alert"></div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat password">
    </div>

    <button class="btn btn-primary" onclick="handleUpdate()">Update Password</button>

    <div class="auth-footer">
      <a href="login.html">Back to Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zefjugcexrmxemfmlgda.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_d42F-4G6jZGOGUux8ztr9Q_Ri2Bkovm'
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function showAlert(message, type) {
      document.getElementById('alert').innerHTML =
        `<div class="alert alert-${type}">${message}</div>`
    }

    async function handleUpdate() {
      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirm-password').value

      if (!password || !confirm) {
        showAlert('Please fill in all fields', 'error')
        return
      }

      if (password !== confirm) {
        showAlert('Passwords do not match', 'error')
        return
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters', 'error')
        return
      }

      const { error } = await sbClient.auth.updateUser({ password })

      if (error) {
        showAlert(error.message, 'error')
        return
      }

      showAlert('Password updated successfully! Redirecting...', 'success')
      setTimeout(() => location.href = 'login.html', 2000)
    }
  </script>

</body>
</html>
