<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaisonFlow — Forgot Password</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .auth-logo {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
    }
    .auth-logo span { color: #2563eb; }
    .auth-subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #64748b; }
    .auth-footer a { color: #2563eb; font-weight: 600; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-logo">Maison<span>Flow</span></div>
    <p class="auth-subtitle">Enter your email to reset your password</p>

    <div id="alert"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <button class="btn btn-primary" onclick="handleReset()">Send Reset Link</button>

    <div class="auth-footer">
      Remembered your password? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zefjugcexrmxemfmlgda.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_d42F-4G6jZGOGUux8ztr9Q_Ri2Bkovm'
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function showAlert(message, type) {
      document.getElementById('alert').innerHTML =
        `<div class="alert alert-${type}">${message}</div>`
    }

    async function handleReset() {
      const email = document.getElementById('email').value.trim()

      if (!email) {
        showAlert('Please enter your email address', 'error')
        return
      }

      const { error } = await sbClient.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://maisonflow.vercel.app/pages/reset-password.html'
      })

      if (error) {
        showAlert(error.message, 'error')
        return
      }

      showAlert('Reset link sent! Please check your email.', 'success')
    }
  </script>

</body>
</html>
